hibernate:
    dialect: org.hibernate.dialect.PostgreSQL10Dialect
dataSource:
    pooled: true
    jmxExport: true
    driverClassName: org.postgresql.Driver
    username: "${POSTGIS_USER:gsb}"
    password: "${POSTGIS_PASSWORD:gsb}"
    dbCreate: update
    url: "jdbc:postgresql://${POSTGIS_HOST:localhost}:${POSTGIS_PORT:5432}/${POSTGIS_DB:geostatusboard}"
    properties:
        validationQuery: SELECT 1
        validationQueryTimeout: 3
        testOnBorrow: true
        testWhileIdle: true

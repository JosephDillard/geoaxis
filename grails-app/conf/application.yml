---
grails:
    profile: web
    codegen:
        defaultPackage: geoaxis
    gorm:
        reactor:
            # Whether to translate GORM events into Reactor events
            # Disabled by default for performance reasons
            events: false
    plugin:
        springsecurity:
            userLookup:
                userDomainClassName: geoaxis.User
                authorityJoinClassName: geoaxis.UserRole
            authority:
                className: geoaxis.Role
            securityConfigType: Annotation
            rejectIfNoRule: true
            fii:
                rejectPublicInvocations: false
            successHandler:
                defaultTargetUrl: '/'
            logout:
                afterLogoutUrl: '/login/auth?logout=true'
            controllerAnnotations:
                staticRules:
                    - pattern: '/error'
                      access: ['permitAll']
                    - pattern: '/notFound'
                      access: ['permitAll']
                    - pattern: '/login/**'
                      access: ['permitAll']
                    - pattern: '/logout/**'
                      access: ['permitAll']
                    - pattern: '/logoff'
                      access: ['permitAll']
                    - pattern: '/shutdown'
                      access: ['permitAll']
                    - pattern: '/assets/**'
                      access: ['permitAll']
                    - pattern: '/**/js/**'
                      access: ['permitAll']
                    - pattern: '/**/css/**'
                      access: ['permitAll']
                    - pattern: '/**/images/**'
                      access: ['permitAll']
                    - pattern: '/**/favicon.ico'
                      access: ['permitAll']
            filterChain:
                chainMap:
                    - pattern: '/assets/**'
                      filters: 'none'
                    - pattern: '/**/js/**'
                      filters: 'none'
                    - pattern: '/**/css/**'
                      filters: 'none'
                    - pattern: '/**/images/**'
                      filters: 'none'
                    - pattern: '/**/favicon.ico'
                      filters: 'none'
                    - pattern: '/**'
                      filters: 'JOINED_FILTERS'
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
spring:
    jmx:
        unique-names: true
    main:
        banner-mode: "off"
    groovy:
        template:
            check-template-location: false
    devtools:
        restart:
            additional-exclude:
                - '*.gsp'
                - '**/*.gsp'
                - '*.gson'
                - '**/*.gson'
                - 'logback.groovy'
                - '*.properties'
server:
    port: 8080
    servlet:
        context-path: /GeoStatusBoard
geo:
    geoserver:
        wfsUrl: http://localhost:8081/geoserver/gsb/ows
        workspace: gsb
        defaultSrs: 'EPSG:4326'
    viewer:
        provider: maplibre
        mapLibreJsUrl: https://unpkg.com/maplibre-gl/dist/maplibre-gl.js
        mapLibreCssUrl: https://unpkg.com/maplibre-gl/dist/maplibre-gl.css
        osmTilesUrl: https://tile.openstreetmap.org/{z}/{x}/{y}.png
        center:
            - -106.0
            - 34.5
        zoom: 6
        maxFeatures: 500
    layers:
        airportStatus:
            title: Airport Status
            typeName: 'gsb:index_airfields'
            idField: site_name
            labelField: site_name
            geometryType: Geometry
            color: '#2563eb'
        currentSIT:
            title: Current Airfield Status
            typeName: 'gsb:index_airfields'
            idField: site_name
            labelField: site_name
            geometryType: Geometry
            color: '#0f766e'
        airfieldSurfaceStatus:
            title: Airfield Surface Status
            typeName: 'gsb:runwaydamagepolys'
            idField: objectid
            labelField: label
            geometryType: Geometry
            color: '#d97706'
        navaid:
            title: NAVAIDs
            typeName: 'gsb:navigationalaid'
            idField: installationid
            labelField: sdsfeaturename
            geometryType: Geometry
            color: '#7c3aed'
        engineerAssets:
            title: Engineer Assets
            typeName: 'gsb:engineer_assets'
            idField: airfield_name
            labelField: item_name
            geometryType: Geometry
            color: '#475569'
        fireFightingAssets:
            title: Fire Fighting Assets
            typeName: 'gsb:fire_fighting_assets'
            idField: airfield_name
            labelField: item_name
            geometryType: Geometry
            color: '#dc2626'
        utilityStatus:
            title: Utility Status
            typeName: 'gsb:utility_status'
            idField: airfield_name
            labelField: airfield_name
            geometryType: Geometry
            color: '#16a34a'
        currentIncidents:
            title: Current Incidents
            typeName: 'gsb:afim_event_point_bm0914'
            idField: mgrs_coord
            labelField: incident_id
            geometryType: Geometry
            color: '#b91c1c'
        incidentsArchive:
            title: Incident Archive
            typeName: 'gsb:afim_event_archive'
            idField: mgrs_coord
            labelField: incident_id
            geometryType: Geometry
            color: '#9333ea'
environments:
    development:
        management:
            endpoints:
                enabled-by-default: true
                web:
                    base-path: '/actuator'
                    exposure:
                        include: '*'
    production:
        management:
            endpoints:
                enabled-by-default: false

---
grails:
    mime:
        disable:
            accept:
                header:
                    userAgents:
                        - Gecko
                        - WebKit
                        - Presto
                        - Trident
        types:
            all: '*/*'
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            form: application/x-www-form-urlencoded
            html:
              - text/html
              - application/xhtml+xml
            js: text/javascript
            json:
              - application/json
              - text/json
            multipartForm: multipart/form-data
            pdf: application/pdf
            rss: application/rss+xml
            text: text/plain
            hal:
              - application/hal+json
              - application/hal+xml
            xml:
              - text/xml
              - application/xml
    urlmapping:
        cache:
            maxsize: 1000
    controllers:
        defaultScope: singleton
    converters:
        encoding: UTF-8
    views:
        default:
            codec: html
        gsp:
            encoding: UTF-8
            htmlcodec: xml
            codecs:
                expression: html
                scriptlet: html
                taglib: none
                staticparts: none

---
hibernate:
    cache:
        queries: false
        use_second_level_cache: false
        use_query_cache: false
dataSource:
    pooled: true
    jmxExport: true
    driverClassName: org.h2.Driver
    username: sa
    password: ''
dataSources:
    geocmtthree:
        pooled: true
        jmxExport: true
        driverClassName: org.h2.Driver
        username: sa
        password: ''
    geocmtfour:
        pooled: true
        jmxExport: true
        driverClassName: org.h2.Driver
        username: sa
        password: ''

environments:
    development:
        dataSource:
            dbCreate: create-drop
            url: jdbc:h2:mem:devDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
        dataSources:
            geocmtthree:
                dbCreate: create-drop
                url: jdbc:h2:mem:geocmtthreeDevDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
            geocmtfour:
                dbCreate: create-drop
                url: jdbc:h2:mem:geocmtfourDevDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    test:
        dataSource:
            dbCreate: update
            url: jdbc:h2:mem:testDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
        dataSources:
            geocmtthree:
                dbCreate: update
                url: jdbc:h2:mem:geocmtthreeTestDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
            geocmtfour:
                dbCreate: update
                url: jdbc:h2:mem:geocmtfourTestDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    production:
        dataSource:
            dbCreate: none
            url: jdbc:h2:./prodDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
            properties:
                jmxEnabled: true
                initialSize: 5
                maxActive: 50
                minIdle: 5
                maxIdle: 25
                maxWait: 10000
                maxAge: 600000
                timeBetweenEvictionRunsMillis: 5000
                minEvictableIdleTimeMillis: 60000
                validationQuery: SELECT 1
                validationQueryTimeout: 3
                validationInterval: 15000
                testOnBorrow: true
                testWhileIdle: true
                testOnReturn: false
                jdbcInterceptors: ConnectionState
                defaultTransactionIsolation: 2 # TRANSACTION_READ_COMMITTED
        dataSources:
            geocmtthree:
                dbCreate: none
                url: jdbc:h2:./prodGeocmtThreeDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
            geocmtfour:
                dbCreate: none
                url: jdbc:h2:./prodGeocmtFourDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
